spring.application.name=cab-api-gateway-service


server.port=9090

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Enable gateway discovery
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

spring.cloud.netflix.eureka.discovery.enabled=true

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://CAB-USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# DRIVER SERVICE
spring.cloud.gateway.routes[1].id=driver-service
spring.cloud.gateway.routes[1].uri=lb://CAB-DRIVER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/drivers/**

# RIDER SERVICE
spring.cloud.gateway.routes[2].id=rider-service
spring.cloud.gateway.routes[2].uri=lb://CAB-RIDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/rides/**

# PAYMENT SERVICE
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://CAB-PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**